<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply for a Loan | Shield Microfinance Bank</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Styling the Django {{ form.as_p }} tags */
        form p {
            margin-bottom: 1.25rem;
            display: flex;
            flex-direction: column;
        }
        form label {
            font-weight: 600;
            font-size: 0.875rem;
            color: #1e3a8a; /* blue-900 */
            margin-bottom: 0.5rem;
        }
        form input, form select, form textarea {
            padding: 0.75rem;
            border: 1px solid #e2e8f0;
            border-radius: 0.5rem;
            outline: none;
            transition: all 0.2s;
        }
        form input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900">

    <header class="bg-white border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center">
                    <div class="h-8 w-8 bg-blue-600 rounded-lg flex items-center justify-center mr-3">
                        <span class="text-white font-bold">S</span>
                    </div>
                    <span class="text-xl font-bold tracking-tight text-blue-900 uppercase">Shield Microfinance Bank</span>
                </div>
                <nav class="hidden md:flex space-x-8">
                    <a href="#" class="text-slate-500 hover:text-blue-600 font-medium">Loans</a>
                    <a href="#" class="text-slate-500 hover:text-blue-600 font-medium">Rates</a>
                    <a href="#" class="text-slate-500 hover:text-blue-600 font-medium">Contact</a>
                </nav>
            </div>
        </div>
    </header>

    <main class="py-12 px-4">
        <div class="max-w-lg mx-auto">
            <div class="bg-white rounded-2xl shadow-xl shadow-blue-100/50 border border-slate-100 overflow-hidden">
                <div class="p-8">
                    <div class="mb-8">
                        <h1 class="text-2xl font-bold text-slate-900">Loan Application</h1>
                        <p class="text-slate-500 mt-2">Complete the form below and our team will review your request within 24 hours.</p>
                    </div>

                    <form method="post" class="space-y-4">
                        {% csrf_token %}

                        {{ form.as_p }}

                        <div class="pt-4">
                            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg transition duration-200 shadow-lg shadow-blue-200">
                                Submit Application
                            </button>
                        </div>
                    </form>
                </div>
                <div class="bg-slate-50 px-8 py-4 border-t border-slate-100">
                    <p class="text-xs text-slate-400 text-center">
                        By submitting, you agree to our terms of service and privacy policy.
                    </p>
                </div>
            </div>
        </div>
    </main>

</body>
</html>
